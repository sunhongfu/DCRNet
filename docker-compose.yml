# DCRNet – Docker Compose
# Usage:
#   docker compose build && docker compose up
#   Open http://localhost:7860

services:
  dcrnet:
    build:
      context: .
      args:
        TORCH_VARIANT: cpu   # change to cu121 for NVIDIA GPU
    image: dcrnet:latest
    ports:
      - "7860:7860"
    volumes:
      - ./outputs:/tmp/outputs
    restart: unless-stopped

    # NVIDIA GPU – uncomment below, set TORCH_VARIANT=cu121
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
